name: Daily Brief

# Generate a fresh daily report and publish to GitHub Pages.
#
# One-time setup for forkers (see README → "Run on GitHub Actions"):
#   1. Settings → Actions → General → enable workflows (forked repos start disabled)
#   2. Settings → Pages → Build & deployment → Source: "Deploy from a branch" → gh-pages / root
#   3. Settings → Secrets and variables → Actions:
#        - Secrets: ANTHROPIC_API_KEY (or OPENAI / DEEPSEEK / MINIMAX as you prefer)
#        - Variables (all optional, sensible defaults provided):
#            LLM_BACKEND     anthropic | openai | deepseek | minimax    (default: anthropic)
#            LLM_MODEL       e.g. claude-sonnet-4-6 / gpt-4o-mini       (backend default if unset)
#            REPORT_LOCALE   zh | en                                    (default: zh)
#            REPORT_TZ       IANA tz, e.g. Asia/Shanghai / UTC          (default: UTC in CI)
#            REPORT_HOUR     trigger hour(s) in REPORT_TZ, comma-list   (default: 8 — 08:00)
#                            examples: "8" / "8,18" / "0,6,12,18"
#            REPORT_DAYS     day-of-week filter (cron-style 0-6 SUN=0)  (default: * — every day)
#                            examples: "*" / "1-5" (weekdays) / "1,3,5" (MWF)
#   4. Trigger once manually from Actions tab to seed gh-pages.
#
# After first successful run your report is live at:
#   https://<your-username>.github.io/<repo-name>/
#
# Schedule mechanics: cron fires hourly because GitHub Actions cron is UTC-only
# and we want the user's local-timezone hour. A short "gate" job checks the
# current hour in REPORT_TZ against REPORT_HOUR and only allows the build job
# to run when they match. workflow_dispatch always bypasses the gate.

on:
  schedule:
    # Hourly trigger at minute 7 (off-peak). GitHub Actions silently drops
    # a non-trivial fraction of scheduled runs whose cron lands at minute
    # 0 — that's where everyone clusters. Moving to an odd off-peak minute
    # roughly halves the miss rate. The gate decides which firings actually
    # build, and the catchup branch in the gate covers the residual misses
    # by allowing a build later in the day if today's report is still
    # absent from gh-pages.
    - cron: '7 * * * *'
  workflow_dispatch:

permissions:
  contents: write  # needed to push to gh-pages branch

concurrency:
  group: daily-brief
  cancel-in-progress: false

jobs:
  gate:
    name: Time gate
    runs-on: ubuntu-latest
    outputs:
      should-run: ${{ steps.check.outputs.should-run }}
    steps:
      - name: Check schedule
        id: check
        env:
          REPORT_TZ: ${{ vars.REPORT_TZ }}
          REPORT_HOUR: ${{ vars.REPORT_HOUR }}
          REPORT_DAYS: ${{ vars.REPORT_DAYS }}
          EVENT_NAME: ${{ github.event_name }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail

          # Manual triggers always run — user clicked Run workflow.
          if [ "$EVENT_NAME" = "workflow_dispatch" ]; then
            echo "Manual trigger — bypassing time gate"
            echo "should-run=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          TZ_VAL="${REPORT_TZ:-UTC}"
          HOURS_VAL="${REPORT_HOUR:-8}"
          DAYS_VAL="${REPORT_DAYS:-*}"

          NOW_HOUR=$(TZ="$TZ_VAL" date +%-H)
          NOW_DOW=$(TZ="$TZ_VAL" date +%w)
          NOW_PRINT=$(TZ="$TZ_VAL" date '+%Y-%m-%d %H:%M %Z')

          echo "Now in $TZ_VAL: $NOW_PRINT (hour=$NOW_HOUR, dow=$NOW_DOW)"
          echo "Configured REPORT_HOUR='$HOURS_VAL', REPORT_DAYS='$DAYS_VAL'"

          # Hour match: comma-separated list of integers (0-23).
          hour_match=false
          IFS=',' read -ra HLIST <<< "$HOURS_VAL"
          for h in "${HLIST[@]}"; do
            h_trim="${h// /}"
            if [ "$NOW_HOUR" = "$h_trim" ]; then
              hour_match=true
              break
            fi
          done

          # Day-of-week match: '*', single digits, ranges "a-b", or comma combos.
          day_match=false
          if [ "$DAYS_VAL" = "*" ]; then
            day_match=true
          else
            IFS=',' read -ra DLIST <<< "$DAYS_VAL"
            for d in "${DLIST[@]}"; do
              d_trim="${d// /}"
              if [[ "$d_trim" == *-* ]]; then
                start="${d_trim%-*}"
                end="${d_trim#*-}"
                if [ "$NOW_DOW" -ge "$start" ] && [ "$NOW_DOW" -le "$end" ]; then
                  day_match=true
                  break
                fi
              else
                if [ "$NOW_DOW" = "$d_trim" ]; then
                  day_match=true
                  break
                fi
              fi
            done
          fi

          # Catchup branch — covers GitHub Actions silently dropping scheduled
          # triggers (which happens to ~30% of cron runs, especially at the
          # exact target hour). Fires when:
          #   1. day matches AND
          #   2. exact hour didn't match AND
          #   3. we're past today's earliest REPORT_HOUR AND
          #   4. today's report doesn't yet exist on gh-pages
          # Once today's report is published, this branch self-suppresses on
          # subsequent gate runs — no double-builds per day.
          catchup_match=false
          if [ "$day_match" = "true" ] && [ "$hour_match" = "false" ]; then
            earliest_hour=99
            for h in "${HLIST[@]}"; do
              h_trim="${h// /}"
              if [ "$h_trim" -lt "$earliest_hour" ]; then
                earliest_hour=$h_trim
              fi
            done
            if [ "$NOW_HOUR" -gt "$earliest_hour" ]; then
              TODAY=$(TZ="$TZ_VAL" date +%Y-%m-%d)
              CHECK_URL="https://api.github.com/repos/${GITHUB_REPOSITORY}/contents/${TODAY}/${TODAY}.html?ref=gh-pages"
              HTTP_CODE=$(curl -s -o /dev/null -w "%{http_code}" \
                -H "Authorization: Bearer ${GH_TOKEN}" \
                -H "Accept: application/vnd.github+json" \
                -H "X-GitHub-Api-Version: 2022-11-28" \
                "$CHECK_URL" || echo "000")
              if [ "$HTTP_CODE" = "404" ]; then
                echo "↻ Catchup: today's report ($TODAY) missing from gh-pages — recovering"
                catchup_match=true
              else
                echo "Catchup check: today's report exists (HTTP $HTTP_CODE) — no action"
              fi
            fi
          fi

          if [ "$hour_match" = "true" ] && [ "$day_match" = "true" ]; then
            echo "✓ Match — proceeding to build"
            echo "should-run=true" >> "$GITHUB_OUTPUT"
          elif [ "$catchup_match" = "true" ]; then
            echo "✓ Catchup — proceeding to build"
            echo "should-run=true" >> "$GITHUB_OUTPUT"
          else
            echo "✗ No match — skipping (hour=$hour_match day=$day_match catchup=$catchup_match)"
            echo "should-run=false" >> "$GITHUB_OUTPUT"
          fi

  build:
    name: Build & publish
    needs: gate
    if: needs.gate.outputs.should-run == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      # Bring previous reports into the workspace so they survive each run
      # and so build-site can list them all in the archive.
      - name: Restore existing reports from gh-pages
        run: |
          mkdir -p daily_reports
          if git ls-remote --exit-code --heads origin gh-pages >/dev/null 2>&1; then
            git fetch origin gh-pages --depth=1
            git --work-tree=daily_reports checkout origin/gh-pages -- . || true
            # Drop the index/archive — build-site regenerates them
            rm -f daily_reports/index.html daily_reports/archive.html
            echo "Restored $(ls -1d daily_reports/20*/ 2>/dev/null | wc -l) prior report dirs"
          else
            echo "gh-pages doesn't exist yet — first run"
          fi

      - name: Generate today's report
        env:
          LLM_BACKEND: ${{ vars.LLM_BACKEND || 'anthropic' }}
          LLM_MODEL: ${{ vars.LLM_MODEL }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
          MINIMAX_API_KEY: ${{ secrets.MINIMAX_API_KEY }}
          # Optional proxy / self-hosted endpoints — forward whatever the
          # forker set in Settings → Variables. Empty values are a no-op
          # (backends fall back to the official URL in code).
          ANTHROPIC_BASE_URL: ${{ vars.ANTHROPIC_BASE_URL }}
          OPENAI_BASE_URL: ${{ vars.OPENAI_BASE_URL }}
          DEEPSEEK_BASE_URL: ${{ vars.DEEPSEEK_BASE_URL }}
          MINIMAX_BASE_URL: ${{ vars.MINIMAX_BASE_URL }}
          # Generic aliases — handy when pointing at an OpenAI/Anthropic
          # compatible service that isn't one of the named presets (Moonshot,
          # SiliconFlow, OpenRouter, self-hosted, ...). Provider-specific
          # vars above take precedence when both are set.
          LLM_API_KEY: ${{ secrets.LLM_API_KEY }}
          LLM_BASE_URL: ${{ vars.LLM_BASE_URL }}
          REPORT_LOCALE: ${{ vars.REPORT_LOCALE || 'zh' }}
          REPORT_TZ: ${{ vars.REPORT_TZ }}
          WEB_MODE: 'true'
        run: npm run daily

      - name: Build static site (index + archive)
        run: npm run build-site

      - name: Publish to main/docs
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./daily_reports
          publish_branch: main
          destination_dir: docs
          keep_files: false  # we restored everything above, so a clean publish is fine
          commit_message: 'daily: report for ${{ github.run_id }}'
